<nav class="breadcrumb-trail" aria-label="Breadcrumb">
    {% for crumb in crumbs %}
        {% if crumb.url %}
            <a href="{{ crumb.url }}">{{ crumb.label }}</a>
        {% else %}
            <span>{{ crumb.label }}</span>
        {% endif %}
        {% if not forloop.last %}
            <span class="breadcrumb-separator">/</span>
        {% endif %}
    {% endfor %}
</nav>
